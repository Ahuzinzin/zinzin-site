<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bakery Bonanza — ZinZin Studio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100%;height:100%;
  background:#1a0533;
  overflow:hidden;
  font-family:'Nunito',sans-serif;
  user-select:none;
}

/* ── GAME SHELL ── */
#shell{
  width:100vw; height:100vh;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  position:relative;
}

/* ── PIXI CANVAS ── */
#game-canvas{ display:block; position:relative; z-index:1; }

/* ── BOTTOM HUD ── */
#hud{
  position:fixed; bottom:0; left:0; right:0; height:80px;
  background:linear-gradient(180deg, rgba(15,5,30,0) 0%, rgba(15,5,30,0.97) 40%, #0d0320 100%);
  display:flex; align-items:center; justify-content:center; gap:0;
  z-index:50; padding:0 20px;
}

.hud-panel{
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-width:140px;
}
.hud-label{
  font-size:10px; font-weight:800; letter-spacing:2px; text-transform:uppercase;
  color:rgba(255,255,255,0.4); margin-bottom:2px;
}
.hud-val{
  font-family:'Fredoka One',cursive; font-size:20px;
  color:#fff; letter-spacing:.5px;
  transition:color .3s;
}
.hud-val.win-flash{ color:#ffd700; text-shadow:0 0 12px rgba(255,215,0,.6); }

/* Dividers */
.hud-div{
  width:1px; height:32px;
  background:rgba(255,255,255,0.1);
  margin:0 4px;
}

/* ── SPIN BUTTON ── */
#spin-btn{
  width:72px; height:72px; border-radius:50%;
  background:conic-gradient(from 0deg, #ff4daa, #ff8c00, #ffd700, #ff4daa);
  border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 0 24px rgba(255,77,170,.5), 0 4px 16px rgba(0,0,0,.5);
  transition:all .15s; position:relative; flex-shrink:0;
  margin:0 20px;
}
#spin-btn::before{
  content:'';position:absolute;inset:3px;border-radius:50%;
  background:linear-gradient(135deg,#c0006b,#ff3399);
}
#spin-btn:hover{ transform:scale(1.06); box-shadow:0 0 36px rgba(255,77,170,.7); }
#spin-btn:active{ transform:scale(.95); }
#spin-btn:disabled{ opacity:.5; cursor:not-allowed; transform:none; }
#spin-btn svg{ position:relative; z-index:1; width:30px; height:30px; fill:white; }

/* Spin button spinning state */
#spin-btn.spinning::before{
  animation:spin-ring .5s linear infinite;
}
@keyframes spin-ring{
  from{background:linear-gradient(135deg,#c0006b,#ff3399)}
  to{background:linear-gradient(315deg,#c0006b,#ff3399)}
}

/* ── BET CONTROLS ── */
.bet-control{
  display:flex; flex-direction:column; align-items:center;
}
.bet-stepper{
  display:flex; align-items:center; gap:6px; margin-top:4px;
}
.bet-step{
  width:24px; height:24px; border-radius:50%;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);
  color:rgba(255,255,255,.7); font-size:14px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:all .15s; font-family:inherit;
}
.bet-step:hover{ background:rgba(255,77,170,.3); color:#fff; }

/* ── TOP BAR ── */
#topbar{
  position:fixed; top:0; left:0; right:0; height:48px;
  background:linear-gradient(0deg, transparent 0%, rgba(10,2,25,0.9) 100%);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px; z-index:50;
}
.tb-logo{
  font-family:'Fredoka One',cursive;
  font-size:17px; color:#ff4daa;
  text-shadow:0 0 10px rgba(255,77,170,.5);
  letter-spacing:.5px;
}
.tb-logo span{ color:#ffd700; }
.tb-right{
  display:flex; align-items:center; gap:10px;
}
.tb-badge{
  font-size:10px; font-weight:800; letter-spacing:1.5px;
  text-transform:uppercase; color:rgba(255,255,255,.3);
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  padding:4px 10px; border-radius:4px;
}

/* ── PAYLINES TOGGLE ── */
#paylines-btn{
  background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12);
  color:rgba(255,255,255,.5); border-radius:6px;
  padding:5px 12px; font-family:inherit; font-size:11px; font-weight:700;
  letter-spacing:1px; text-transform:uppercase; cursor:pointer;
  transition:all .2s;
}
#paylines-btn:hover{ color:#fff; border-color:rgba(255,77,170,.4); }

/* ── WIN MESSAGE ── */
#win-msg{
  position:fixed; top:50%; left:50%;
  transform:translate(-50%, -50%);
  text-align:center; pointer-events:none;
  z-index:60; opacity:0;
  transition:opacity .3s;
}
#win-msg.show{ opacity:1; }
#win-msg-text{
  font-family:'Fredoka One',cursive;
  font-size:clamp(28px,5vw,52px);
  color:#ffd700;
  text-shadow:0 0 30px rgba(255,215,0,.7), 0 4px 0 rgba(180,100,0,.5);
  letter-spacing:1px;
}
#win-msg-amount{
  font-family:'Fredoka One',cursive;
  font-size:clamp(38px,7vw,72px);
  color:#fff;
  text-shadow:0 0 40px rgba(255,215,0,.9), 0 6px 0 rgba(180,80,0,.6);
  margin-top:4px;
}

/* ── SUPER WIN OVERLAY ── */
#super-win{
  position:fixed; inset:0; z-index:200;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  opacity:0; pointer-events:none;
  transition:opacity .4s;
}
#super-win.show{ opacity:1; pointer-events:all; }

#super-win-bg{
  position:absolute; inset:0;
  background:radial-gradient(ellipse 80% 80% at 50% 50%, rgba(80,0,120,.92) 0%, rgba(10,0,30,.97) 70%);
}
/* Gold rays */
#super-win-rays{
  position:absolute; inset:0;
  background:conic-gradient(from 0deg, transparent 0deg 5deg, rgba(255,215,0,.04) 5deg 10deg, transparent 10deg 15deg, rgba(255,215,0,.04) 15deg 20deg, transparent 20deg);
  animation:rays 8s linear infinite;
  pointer-events:none;
}
@keyframes rays{ from{transform:rotate(0)} to{transform:rotate(360deg)} }

#super-win-content{
  position:relative; z-index:2;
  text-align:center;
  animation:superPop .5s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes superPop{
  from{transform:scale(.4);opacity:0}
  to{transform:scale(1);opacity:1}
}

.sw-label{
  font-family:'Fredoka One',cursive;
  font-size:clamp(18px,3vw,28px);
  color:rgba(255,215,0,.8); letter-spacing:4px;
  text-transform:uppercase; margin-bottom:8px;
  animation:sw-pulse 1s ease-in-out infinite;
}
@keyframes sw-pulse{ 0%,100%{opacity:.7} 50%{opacity:1} }

.sw-type{
  font-family:'Fredoka One',cursive;
  font-size:clamp(52px,10vw,120px);
  line-height:.9; letter-spacing:2px;
  background:linear-gradient(180deg,#fff9c0 0%,#ffd700 40%,#ff8c00 80%,#ff4400 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 30px rgba(255,215,0,.5));
  text-transform:uppercase;
}

.sw-amount-wrap{ margin:16px 0; }
.sw-amount{
  font-family:'Fredoka One',cursive;
  font-size:clamp(40px,7vw,88px);
  color:#fff;
  text-shadow:0 0 40px rgba(255,215,0,1), 0 8px 0 rgba(180,80,0,.6);
}

.sw-coins{
  display:flex; justify-content:center; gap:12px; margin:16px 0; font-size:32px;
}

.sw-close{
  background:linear-gradient(135deg,#ff4daa,#c0006b);
  color:#fff; border:none; border-radius:50px;
  padding:14px 44px; font-family:'Fredoka One',cursive;
  font-size:18px; letter-spacing:1px; cursor:pointer;
  box-shadow:0 6px 24px rgba(255,77,170,.4);
  transition:all .2s; margin-top:12px;
}
.sw-close:hover{ transform:translateY(-2px); box-shadow:0 10px 30px rgba(255,77,170,.6); }

/* ── PARTICLES CANVAS ── */
#pfx{
  position:fixed; inset:0; pointer-events:none; z-index:190;
}

/* ── FREE SPINS BANNER ── */
#fs-banner{
  position:fixed; top:60px; left:50%;
  transform:translateX(-50%) translateY(-80px);
  background:linear-gradient(135deg,#ff8c00,#ffd700);
  color:#0f0520; padding:8px 24px; border-radius:50px;
  font-family:'Fredoka One',cursive; font-size:16px;
  letter-spacing:1px; z-index:60;
  box-shadow:0 4px 20px rgba(255,200,0,.4);
  transition:transform .4s cubic-bezier(.34,1.56,.64,1);
}
#fs-banner.show{ transform:translateX(-50%) translateY(0); }

/* ── TOAST ── */
#toast{
  position:fixed; bottom:100px; left:50%;
  transform:translateX(-50%) translateY(10px);
  background:#ff4daa; color:#fff;
  padding:8px 22px; border-radius:30px;
  font-size:13px; font-weight:700; letter-spacing:.5px;
  opacity:0; transition:all .25s; pointer-events:none; z-index:100;
}
#toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="shell">
  <!-- TOP BAR -->
  <div id="topbar">
    <div class="tb-logo">BAKERY <span>BONANZA</span></div>
    <div class="tb-right">
      <button id="paylines-btn" onclick="togglePaylines()">Paylines</button>
      <div class="tb-badge">Demo</div>
      <div class="tb-badge" style="color:rgba(255,215,0,.5);border-color:rgba(255,215,0,.15)">RTP 96.7%</div>
    </div>
  </div>

  <!-- PIXI CANVAS -->
  <canvas id="game-canvas"></canvas>

  <!-- FREE SPINS BANNER -->
  <div id="fs-banner">🎰 FREE SPINS: <span id="fs-count">0</span> remaining</div>

  <!-- WIN MESSAGE (mid-screen) -->
  <div id="win-msg">
    <div id="win-msg-text">YOU WIN!</div>
    <div id="win-msg-amount">$0.00</div>
  </div>

  <!-- BOTTOM HUD -->
  <div id="hud">
    <div class="hud-panel">
      <div class="hud-label">Balance</div>
      <div class="hud-val" id="hud-balance">1,000.00</div>
    </div>
    <div class="hud-div"></div>
    <div class="hud-panel bet-control">
      <div class="hud-label">Total Bet</div>
      <div class="hud-val" id="hud-bet">1.00</div>
      <div class="bet-stepper">
        <button class="bet-step" onclick="changeBet(-1)">−</button>
        <button class="bet-step" onclick="changeBet(1)">+</button>
      </div>
    </div>
    <div class="hud-div"></div>

    <!-- SPIN BUTTON -->
    <button id="spin-btn" onclick="spin()">
      <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.96 7.96 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
    </button>

    <div class="hud-div"></div>
    <div class="hud-panel">
      <div class="hud-label">Win</div>
      <div class="hud-val win-flash" id="hud-win">0.00</div>
    </div>
    <div class="hud-div"></div>
    <div class="hud-panel">
      <div class="hud-label">Lines</div>
      <div class="hud-val" id="hud-lines">20</div>
    </div>
  </div>
</div>

<!-- SUPER WIN OVERLAY -->
<div id="super-win">
  <div id="super-win-bg"></div>
  <div id="super-win-rays"></div>
  <div id="super-win-content">
    <div class="sw-label">✨ Congratulations ✨</div>
    <div class="sw-type" id="sw-type-text">SUPER WIN</div>
    <div class="sw-coins">🍰 🧁 🍭 🎂 🍬</div>
    <div class="sw-amount-wrap">
      <div class="sw-amount" id="sw-amount">$0.00</div>
    </div>
    <button class="sw-close" onclick="closeSuperWin()">Collect & Continue →</button>
  </div>
</div>

<!-- PARTICLES -->
<canvas id="pfx"></canvas>
<div id="toast"></div>

<script>
// ════════════════════════════════════════════════════════
//  BAKERY BONANZA — Senior PixiJS Slot Engine
//  ZinZin Studio · RTP 96.7% · 5×3 · 20 Paylines
//  Symbols: Card suits (low) + Pastries (high) + Wild + Scatter
// ════════════════════════════════════════════════════════

// ── SYMBOLS ──────────────────────────────────────────────
// id, emoji, label, tier, paytable (3/4/5 of a kind × bet per line)
const SYMS = [
  { id:0,  e:'♠️',  label:'Spade',    tier:'low',  pays:[0,0.4,  1.5,  5   ], weight:14 },
  { id:1,  e:'♣️',  label:'Club',     tier:'low',  pays:[0,0.4,  1.5,  5   ], weight:14 },
  { id:2,  e:'♥️',  label:'Heart',    tier:'low',  pays:[0,0.6,  2,    6   ], weight:12 },
  { id:3,  e:'🟪',  label:'Diamond',  tier:'low',  pays:[0,0.6,  2,    6   ], weight:12 },
  { id:4,  e:'🎂',  label:'Cake-R',   tier:'mid',  pays:[0,1,    4,    12  ], weight:9  },
  { id:5,  e:'🧁',  label:'Cake-O',   tier:'mid',  pays:[0,1,    4,    12  ], weight:9  },
  { id:6,  e:'🍈',  label:'Cake-G',   tier:'mid',  pays:[0,1.5,  6,    18  ], weight:7  },
  { id:7,  e:'🥤',  label:'Milkshake',tier:'high', pays:[0,2,    8,    25  ], weight:6  },
  { id:8,  e:'🍦',  label:'Icecream', tier:'high', pays:[0,3,    12,   40  ], weight:5  },
  { id:9,  e:'🎪',  label:'Wild',     tier:'wild', pays:[0,5,    20,   100 ], weight:3  }, // WILD
  { id:10, e:'🌈',  label:'Scatter',  tier:'scat', pays:[0,2,    10,   50  ], weight:2  }, // SCATTER → Free Spins
];

// Better emoji rendering via canvas
const SYM_COLORS = {
  0: '#4488ff', 1: '#44cc44', 2: '#ff4455', 3: '#cc44ff',
  4: '#ff6688', 5: '#ff8844', 6: '#88cc44',
  7: '#ff88aa', 8: '#44ccff', 9: '#ffd700', 10: '#ff44aa'
};

const WILD_ID    = 9;
const SCATTER_ID = 10;
const COLS = 5, ROWS = 3;
const TOTAL_WEIGHT = SYMS.reduce((s,sym) => s + sym.weight, 0);

// ── 20 PAYLINES (standard 5×3) ───────────────────────────
// Each payline: [row for col0, row for col1, row for col2, row for col3, row for col4]
const PAYLINES = [
  [1,1,1,1,1], // 1 middle
  [0,0,0,0,0], // 2 top
  [2,2,2,2,2], // 3 bottom
  [0,1,2,1,0], // 4 V-shape
  [2,1,0,1,2], // 5 inverted V
  [0,0,1,2,2], // 6
  [2,2,1,0,0], // 7
  [1,0,0,0,1], // 8
  [1,2,2,2,1], // 9
  [0,1,1,1,0], // 10
  [2,1,1,1,2], // 11
  [1,0,1,2,1], // 12
  [1,2,1,0,1], // 13
  [0,0,1,0,0], // 14
  [2,2,1,2,2], // 15
  [1,1,0,1,1], // 16
  [1,1,2,1,1], // 17
  [0,1,0,1,0], // 18
  [2,1,2,1,2], // 19
  [0,2,0,2,0], // 20
];

// ── GAME STATE ────────────────────────────────────────────
const Game = {
  balance:   1000.00,
  bet:       1.00,
  betLevels: [0.20, 0.50, 1.00, 2.00, 5.00, 10.00, 20.00, 50.00],
  betIdx:    2,
  lines:     20,
  spinning:  false,
  freeSpins: 0,
  fsFired:   false,
  totalWin:  0,
  grid:      [], // [col][row] = symId
  showPaylines: false,
};

// ── PIXI SETUP ────────────────────────────────────────────
const canvas = document.getElementById('game-canvas');
const W = Math.min(window.innerWidth, 900);
const H = Math.min(window.innerHeight - 80, 600);

const app = new PIXI.Application({
  view: canvas,
  width: W, height: H,
  backgroundColor: 0x0d0520,
  antialias: true,
  resolution: window.devicePixelRatio || 1,
  autoDensity: true,
});

// ── LAYOUT CONSTANTS ─────────────────────────────────────
const CELL_W    = Math.floor((W - 80) / COLS);
const CELL_H    = Math.floor((H - 120) / ROWS);
const GRID_X    = 40;
const GRID_Y    = 55;
const GRID_W    = CELL_W * COLS;
const GRID_H    = CELL_H * ROWS;
const SPIN_ROWS = 20; // extra rows per reel for spin strip

// ── LAYERS ───────────────────────────────────────────────
const layerBG    = new PIXI.Container();
const layerFrame = new PIXI.Container();
const layerReels = new PIXI.Container();
const layerWinFx = new PIXI.Container();
const layerUI    = new PIXI.Container();
app.stage.addChild(layerBG, layerFrame, layerReels, layerWinFx, layerUI);

// ── BACKGROUND ───────────────────────────────────────────
function drawBG() {
  // Bakery interior gradient
  const bg = new PIXI.Graphics();
  bg.beginFill(0x1a0533); bg.drawRect(0,0,W,H); bg.endFill();

  // Warm light from top
  const glow = new PIXI.Graphics();
  for (let i = 8; i >= 0; i--) {
    glow.beginFill(0x9b2a6e, 0.018 * (9-i));
    glow.drawEllipse(W/2, 0, W*0.8, H*0.5 * (i/8));
    glow.endFill();
  }
  layerBG.addChild(bg, glow);

  // Stars / floating particles
  const dots = new PIXI.Graphics();
  for (let i=0; i<40; i++){
    const x = Math.random()*W, y = Math.random()*H;
    dots.beginFill(0xffffff, Math.random()*0.15+0.03);
    dots.drawCircle(x, y, Math.random()*1.5+0.5);
    dots.endFill();
  }
  layerBG.addChild(dots);
}

// ── SLOT FRAME ───────────────────────────────────────────
function drawFrame() {
  const g = new PIXI.Graphics();
  // Shadow
  g.beginFill(0x000000, 0.4);
  g.drawRoundedRect(GRID_X - 6, GRID_Y - 6, GRID_W + 12, GRID_H + 12, 18);
  g.endFill();

  // Candy-cane border top & bottom — pink/white
  const borderH = 10;
  for (let x = 0; x < GRID_W + 20; x += 20) {
    const col = Math.floor(x/10) % 2 === 0 ? 0xff4daa : 0xffffff;
    g.beginFill(col, 0.9);
    g.drawRect(GRID_X - 10 + x, GRID_Y - borderH, 10, borderH);
    g.endFill();
  }

  // Reel background
  g.beginFill(0x2a0550, 0.95);
  g.drawRoundedRect(GRID_X, GRID_Y, GRID_W, GRID_H, 8);
  g.endFill();

  // Column separators
  for (let c = 1; c < COLS; c++) {
    g.lineStyle(1, 0x5a0a9e, 0.4);
    g.moveTo(GRID_X + c * CELL_W, GRID_Y + 8);
    g.lineTo(GRID_X + c * CELL_W, GRID_Y + GRID_H - 8);
  }

  // Outer glow border
  g.lineStyle(2, 0xff4daa, 0.6);
  g.drawRoundedRect(GRID_X, GRID_Y, GRID_W, GRID_H, 8);

  // Candy poles left & right
  drawPole(g, GRID_X - 18, GRID_Y - 10, GRID_H + 20);
  drawPole(g, GRID_X + GRID_W + 8, GRID_Y - 10, GRID_H + 20);

  layerFrame.addChild(g);

  // Title text
  const title = new PIXI.Text('BAKERY BONANZA', {
    fontFamily:'Fredoka One', fontSize:clampFont(20,28,W),
    fill:['#fff9c0','#ffd700','#ff8c00'],
    fillGradientStops:[0,0.5,1],
    fillGradientType:0,
    stroke:'#8b0045', strokeThickness:5,
    dropShadow:true, dropShadowColor:'#ff004d',
    dropShadowBlur:8, dropShadowDistance:2,
    align:'center',
  });
  title.anchor.set(0.5,1);
  title.x = W/2; title.y = GRID_Y - 12;
  layerFrame.addChild(title);
}

function drawPole(g, x, y, h) {
  for (let i = 0; i < h; i += 18) {
    const col = Math.floor(i/18) % 2 === 0 ? 0xff4daa : 0xffffff;
    g.beginFill(col, 0.85);
    g.drawRect(x, y + i, 10, 9);
    g.endFill();
  }
  // Ball tops
  g.beginFill(0xffd700);
  g.drawCircle(x + 5, y, 8);
  g.drawCircle(x + 5, y + h, 8);
  g.endFill();
}

function clampFont(min, max, width) {
  return Math.floor(min + (max-min) * Math.min(1, width/900));
}

// ── SYMBOL TEXTURES ──────────────────────────────────────
// Render each symbol emoji onto a canvas, cache as PIXI texture
const symTextureCache = {};

function makeSymTexture(sym, size) {
  if (symTextureCache[sym.id]) return symTextureCache[sym.id];
  const c = document.createElement('canvas');
  c.width = c.height = size * 2;
  const ctx = c.getContext('2d');

  // Cell background
  const grad = ctx.createRadialGradient(size,size,0, size,size,size);
  grad.addColorStop(0, SYM_COLORS[sym.id] + '22');
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.roundRect(4, 4, size*2-8, size*2-8, 12); ctx.fill();

  // Emoji
  ctx.font = `${Math.floor(size*1.35)}px serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(sym.e, size, size);

  const tex = PIXI.Texture.from(c);
  symTextureCache[sym.id] = tex;
  return tex;
}

// Pre-generate textures
SYMS.forEach(s => makeSymTexture(s, Math.min(CELL_W, CELL_H) * 0.7));

// ── REEL CONTAINERS ──────────────────────────────────────
const reelContainers = []; // one per column
const symbolSprites  = []; // [col][row]

function buildReels() {
  layerReels.removeChildren();
  reelContainers.length = 0;
  symbolSprites.length  = 0;

  // Clip mask for whole grid
  const clipMask = new PIXI.Graphics();
  clipMask.beginFill(0xffffff);
  clipMask.drawRect(GRID_X, GRID_Y, GRID_W, GRID_H);
  clipMask.endFill();
  layerReels.addChild(clipMask);
  layerReels.mask = clipMask;

  for (let c = 0; c < COLS; c++) {
    const reel = new PIXI.Container();
    reel.x = GRID_X + c * CELL_W;
    reel.y = GRID_Y;
    layerReels.addChild(reel);
    reelContainers.push(reel);

    const col = [];
    for (let r = 0; r < ROWS; r++) {
      const sym = randomSym();
      const sp  = makeSymSprite(sym, CELL_W, CELL_H);
      sp.x = 0; sp.y = r * CELL_H;
      reel.addChild(sp);
      col.push(sp);
    }
    symbolSprites.push(col);
    Game.grid[c] = Array.from({length:ROWS}, () => randomSym().id);
  }
}

function makeSymSprite(sym, w, h) {
  const cont = new PIXI.Container();

  // Cell bg
  const bg = new PIXI.Graphics();
  bg.beginFill(0x000000, 0.15);
  bg.drawRoundedRect(3,3,w-6,h-6,8);
  bg.endFill();
  cont.addChild(bg);

  // Symbol icon
  const size = Math.floor(Math.min(w,h) * 0.62);
  const tex  = makeSymTexture(sym, Math.floor(size/2));
  const sp   = new PIXI.Sprite(tex);
  sp.width = size; sp.height = size;
  sp.anchor.set(0.5);
  sp.x = w/2; sp.y = h/2;
  cont.addChild(sp);

  // Wild/Scatter label
  if (sym.tier === 'wild' || sym.tier === 'scat') {
    const lbl = new PIXI.Text(sym.tier === 'wild' ? 'WILD' : 'SCATTER', {
      fontFamily:'Fredoka One', fontSize:11,
      fill:'#ffd700', stroke:'#8b4500', strokeThickness:3,
      align:'center',
    });
    lbl.anchor.set(0.5,1);
    lbl.x = w/2; lbl.y = h - 6;
    cont.addChild(lbl);
  }

  cont._symId = sym.id;
  return cont;
}

function randomSym() {
  let r = Math.random() * TOTAL_WEIGHT;
  for (const s of SYMS) { r -= s.weight; if (r <= 0) return s; }
  return SYMS[0];
}

// ── SPIN ANIMATION ───────────────────────────────────────
const SPIN_DURATION  = 600;  // ms per reel
const SPIN_STAGGER   = 120;  // ms between reels
const BOUNCE_DIST    = 18;   // px overshoot

let spinResults = []; // final grid after spin

function spin() {
  if (Game.spinning) return;
  if (Game.freeSpins === 0 && Game.balance < Game.bet) {
    toast('Insufficient balance!'); return;
  }

  Game.spinning = true;
  layerWinFx.removeChildren();
  hideWinMsg();
  document.getElementById('spin-btn').classList.add('spinning');
  document.getElementById('spin-btn').disabled = true;

  // Debit balance (skip for free spins)
  if (Game.freeSpins === 0) {
    Game.balance = +(Game.balance - Game.bet).toFixed(2);
  } else {
    Game.freeSpins--;
    document.getElementById('fs-count').textContent = Game.freeSpins;
    if (Game.freeSpins === 0) {
      document.getElementById('fs-banner').classList.remove('show');
    }
  }
  Game.totalWin = 0;
  updateHUD();

  // Generate results
  spinResults = Array.from({length:COLS}, () =>
    Array.from({length:ROWS}, () => randomSym().id)
  );

  // Animate reels one by one
  const promises = reelContainers.map((reel, c) =>
    new Promise(resolve => setTimeout(() => animateReel(reel, c, resolve), c * SPIN_STAGGER))
  );

  Promise.all(promises).then(() => {
    // Commit final grid
    Game.grid = spinResults.map(col => [...col]);

    // Update sprites to final symbols
    for (let c = 0; c < COLS; c++) {
      for (let r = 0; r < ROWS; r++) {
        const sym = SYMS.find(s => s.id === spinResults[c][r]);
        updateSprite(symbolSprites[c][r], sym);
      }
    }

    // Evaluate wins
    setTimeout(() => evaluateWins(), 80);
  });
}

function animateReel(reel, colIdx, resolve) {
  const startY  = reel.y;
  const startTime = performance.now();
  const duration  = SPIN_DURATION + colIdx * 60;

  // Assign final symbols to top of strip for snap
  const finalSyms = spinResults[colIdx];

  function frame(now) {
    const elapsed = now - startTime;
    const t = Math.min(1, elapsed / duration);
    const ease = easeOutBack(t);

    // Scroll symbols downward (fast scroll then ease to stop)
    const scrollDist = CELL_H * ROWS * 2.5; // how far it scrolls
    let offset;
    if (t < 0.7) {
      // Fast spin phase
      const spinT = t / 0.7;
      offset = (spinT * spinT * scrollDist) % (CELL_H * ROWS);
    } else {
      // Snap to final
      offset = 0;
    }

    // Cycle symbols during spin
    if (t < 0.85) {
      for (let r = 0; r < ROWS; r++) {
        const sym = SYMS[Math.floor((r + Math.floor(elapsed/60)) % SYMS.length)];
        updateSprite(symbolSprites[colIdx][r], sym, true);
        symbolSprites[colIdx][r].y = r * CELL_H;
      }
    }

    if (t >= 1) {
      // Snap to final position
      reel.y = startY;
      resolve();
      return;
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

function easeOutBack(t) {
  const c1 = 1.70158, c3 = c1 + 1;
  return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
}

function updateSprite(container, sym, fast=false) {
  if (!sym) return;
  container._symId = sym.id;
  // Update the icon sprite (child index 1)
  if (container.children[1]) {
    const size = Math.floor(Math.min(CELL_W,CELL_H) * 0.62);
    const tex  = makeSymTexture(sym, Math.floor(size/2));
    container.children[1].texture = tex;
  }
  // WILD/SCATTER label (child index 2)
  if (container.children[2]) {
    container.children[2].text = sym.tier==='wild' ? 'WILD' : sym.tier==='scat' ? 'SCATTER' : '';
  }
}

// ── WIN EVALUATION ───────────────────────────────────────
function evaluateWins() {
  const wins = [];
  let totalPay = 0;

  // Check each payline
  for (let pl = 0; pl < PAYLINES.length; pl++) {
    const line = PAYLINES[pl];
    let firstSym = Game.grid[0][line[0]];
    // Wild substitution
    if (firstSym === WILD_ID) {
      for (let c = 1; c < COLS; c++) {
        const s = Game.grid[c][line[c]];
        if (s !== WILD_ID) { firstSym = s; break; }
      }
    }
    if (firstSym === SCATTER_ID) continue; // scatter counted separately

    let count = 0;
    const cells = [];
    for (let c = 0; c < COLS; c++) {
      const s = Game.grid[c][line[c]];
      if (s === firstSym || s === WILD_ID) {
        count++;
        cells.push({c, r: line[c]});
      } else break;
    }

    if (count >= 3) {
      const sym   = SYMS.find(s => s.id === firstSym);
      const payIdx= count - 2; // 3=0, 4=1, 5=2
      const betPerLine = Game.bet / Game.lines;
      const pay   = sym.pays[payIdx] * betPerLine * Game.lines;
      if (pay > 0) {
        wins.push({ pl, sym, count, cells, pay });
        totalPay = +(totalPay + pay).toFixed(2);
      }
    }
  }

  // Scatter check
  let scatterCount = 0;
  const scatterCells = [];
  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r < ROWS; r++) {
      if (Game.grid[c][r] === SCATTER_ID) {
        scatterCount++;
        scatterCells.push({c,r});
      }
    }
  }
  if (scatterCount >= 3) {
    const scatSym = SYMS[SCATTER_ID];
    const scatPay = scatSym.pays[scatterCount-2] * Game.bet;
    totalPay = +(totalPay + scatPay).toFixed(2);
    wins.push({ pl:-1, sym:scatSym, count:scatterCount, cells:scatterCells, pay:scatPay, isScatter:true });

    // Trigger free spins
    if (!Game.fsFired) {
      const fsCount = scatterCount >= 5 ? 20 : scatterCount >= 4 ? 15 : 10;
      Game.freeSpins += fsCount;
      document.getElementById('fs-count').textContent = Game.freeSpins;
      document.getElementById('fs-banner').classList.add('show');
      toast(`🎉 ${fsCount} FREE SPINS triggered!`);
    }
  }

  Game.totalWin = totalPay;

  if (totalPay > 0) {
    Game.balance = +(Game.balance + totalPay).toFixed(2);
    showWins(wins, totalPay);
  } else {
    endSpin();
  }
}

// ── SHOW WINS ────────────────────────────────────────────
function showWins(wins, total) {
  layerWinFx.removeChildren();

  wins.forEach(w => {
    w.cells.forEach(({c,r}) => {
      // Highlight cell
      const glow = new PIXI.Graphics();
      glow.lineStyle(3, 0xffd700, 1);
      glow.beginFill(0xffd700, 0.15);
      glow.drawRoundedRect(
        GRID_X + c * CELL_W + 3,
        GRID_Y + r * CELL_H + 3,
        CELL_W - 6, CELL_H - 6, 8
      );
      glow.endFill();
      layerWinFx.addChild(glow);

      // Pulse anim
      let t = 0;
      const ticker = app.ticker.add(() => {
        t += 0.1;
        glow.alpha = 0.5 + 0.5 * Math.sin(t);
        if (t > Math.PI * 5) { app.ticker.remove(ticker); glow.alpha = 0; }
      });
    });
  });

  // Win amount display
  showWinMsg(total);
  updateHUD();

  // Determine win level
  const mult = total / Game.bet;
  if (mult >= 50) {
    setTimeout(() => showSuperWin(total, mult), 600);
  } else if (mult >= 20) {
    setTimeout(() => showSuperWin(total, mult, 'BIG WIN'), 500);
  } else if (mult >= 8) {
    setTimeout(() => showSuperWin(total, mult, 'MEGA WIN'), 500);
  } else {
    setTimeout(endSpin, 2000);
  }
}

// ── SUPER WIN ────────────────────────────────────────────
function showSuperWin(amount, mult, type) {
  const label = type || (mult >= 100 ? 'JACKPOT!' : mult >= 50 ? 'SUPER WIN' : 'MEGA WIN');
  document.getElementById('sw-type-text').textContent = label;
  document.getElementById('sw-amount').textContent    = '$ ' + amount.toFixed(2);
  document.getElementById('super-win').classList.add('show');
  spawnConfetti();
}

function closeSuperWin() {
  document.getElementById('super-win').classList.remove('show');
  stopConfetti();
  endSpin();
}

// ── WIN MESSAGE ──────────────────────────────────────────
function showWinMsg(amount) {
  document.getElementById('win-msg-amount').textContent = '$ ' + amount.toFixed(2);
  document.getElementById('win-msg').classList.add('show');

  // Count-up HUD win
  let cur = 0;
  const step = amount / 30;
  const iv = setInterval(() => {
    cur = Math.min(amount, +(cur + step).toFixed(2));
    document.getElementById('hud-win').textContent = cur.toFixed(2);
    if (cur >= amount) clearInterval(iv);
  }, 40);
}

function hideWinMsg() {
  document.getElementById('win-msg').classList.remove('show');
}

function endSpin() {
  Game.spinning = false;
  document.getElementById('spin-btn').classList.remove('spinning');
  document.getElementById('spin-btn').disabled = false;
  updateHUD();
}

// ── PAYLINES DISPLAY ─────────────────────────────────────
let plinesShown = false;
function togglePaylines() {
  plinesShown = !plinesShown;
  layerUI.removeChildren();
  if (plinesShown) drawPaylineDisplay();
}

function drawPaylineDisplay() {
  const g = new PIXI.Graphics();
  const colors = [0xff4daa,0x44ccff,0xffd700,0x44ff88,0xff8844];

  PAYLINES.forEach((line, i) => {
    const color = colors[i % colors.length];
    g.lineStyle(2, color, 0.7);
    for (let c = 0; c < COLS; c++) {
      const x = GRID_X + c * CELL_W + CELL_W/2;
      const y = GRID_Y + line[c] * CELL_H + CELL_H/2;
      if (c === 0) g.moveTo(x,y); else g.lineTo(x,y);
    }
  });
  layerUI.addChild(g);
}

// ── HUD UPDATES ──────────────────────────────────────────
function updateHUD() {
  document.getElementById('hud-balance').textContent = Game.balance.toFixed(2);
  document.getElementById('hud-bet').textContent     = Game.bet.toFixed(2);
  document.getElementById('hud-win').textContent     = Game.totalWin.toFixed(2);
}

function changeBet(dir) {
  if (Game.spinning) return;
  Game.betIdx = Math.max(0, Math.min(Game.betLevels.length-1, Game.betIdx + dir));
  Game.bet    = Game.betLevels[Game.betIdx];
  updateHUD();
}

// ── CONFETTI PARTICLES ────────────────────────────────────
const pfx    = document.getElementById('pfx');
pfx.width    = window.innerWidth;
pfx.height   = window.innerHeight;
const pfxCtx = pfx.getContext('2d');
let confetti = [], confettiRunning = false;

function spawnConfetti() {
  confettiRunning = true;
  for (let i = 0; i < 120; i++) {
    confetti.push({
      x: Math.random() * pfx.width,
      y: -20 - Math.random() * 200,
      vx: (Math.random()-0.5)*4,
      vy: 2 + Math.random()*5,
      rot: Math.random()*Math.PI*2,
      rv: (Math.random()-.5)*.2,
      w: 8+Math.random()*14, h: 5+Math.random()*8,
      color: ['#ffd700','#ff4daa','#44ccff','#44ff88','#ff8844','#ffffff'][Math.floor(Math.random()*6)],
      life:1,
    });
  }
  animConfetti();
}

function animConfetti() {
  if (!confettiRunning) { pfxCtx.clearRect(0,0,pfx.width,pfx.height); return; }
  pfxCtx.clearRect(0,0,pfx.width,pfx.height);
  confetti = confetti.filter(p => p.life > 0);
  confetti.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.rot += p.rv;
    p.vy += 0.1; p.life -= 0.008;
    pfxCtx.save();
    pfxCtx.globalAlpha = p.life;
    pfxCtx.fillStyle   = p.color;
    pfxCtx.translate(p.x, p.y);
    pfxCtx.rotate(p.rot);
    pfxCtx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
    pfxCtx.restore();
  });
  if (confetti.length > 0) requestAnimationFrame(animConfetti);
}

function stopConfetti() { confettiRunning = false; confetti = []; pfxCtx.clearRect(0,0,pfx.width,pfx.height); }

// ── TOAST ────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'show';
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = '', 3200);
}

// ── AMBIENT ANIMATION ────────────────────────────────────
// Subtle idle float on symbols
app.ticker.add(() => {
  const t = performance.now() / 1000;
  if (!Game.spinning) {
    symbolSprites.forEach((col, c) => {
      col.forEach((sp, r) => {
        sp.y = r * CELL_H + Math.sin(t * 0.8 + c * 0.7 + r * 1.1) * 2;
      });
    });
  }
});

window.addEventListener('resize', () => {
